        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    body {
      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (from JSON) -->
<header class="docked full-width top-0 sticky none shadow-[0_4px_12px_rgba(93,95,239,0.05)] bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex justify-between items-center w-full px-6 h-16 z-50">
<div class="flex items-center gap-4 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full p-2 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-indigo-600 dark:text-indigo-400 text-2xl" data-icon="arrow_back">arrow_back</span>
</div>
<div class="flex-1 text-center">
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-indigo-600 dark:text-indigo-400">Decide Joyfully</h1>
</div>
<div class="flex items-center justify-end w-10">
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden shadow-sm">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A close-up portrait of a cheerful young woman with warm studio lighting, serving as a clean, friendly user profile avatar. The background is a soft neutral tone that blends seamlessly with a modern, bright UI aesthetic. Her expression is welcoming and optimistic, fitting a joyful brand personality." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6NHASFf_Vz-FGUMWKDn9GU85dxVr0oaTP-GGeHQYe8swFmfoFG7pG_7a70HI5re5dzQjrrP5ZVxmxyp2BpoexF-henHgRLOaPKEg3e6IyUPiWknPLYrid11p9uFfwCZbu607Sr9zD_nxcIKce4FnHI0FgAGK8v4lBU0KEZoOnlrdg_CpElRRccGozARFPtSh4rxIeiVXLrWtODAzBShtq4xl1iwU52lo_7FOgYp55h9uRHBY2ak9CK7x4GIiE3nPElpMzQ-V-mwkc"/>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-page py-8 pb-32">
<!-- Contextual Header -->
<h2 class="text-h2 font-h2 text-tertiary mb-stack-gap text-center">Food Picker</h2>
<!-- Slot Machine Centerpiece (Tactile Softness & Minimalist Depth) -->
<div class="relative w-full max-w-sm h-[320px] bg-surface-container rounded-[32px] shadow-[inset_0_4px_24px_rgba(0,0,0,0.02),0_12px_32px_rgba(93,95,239,0.08)] overflow-hidden flex flex-col items-center justify-center mb-8 border border-white/50 backdrop-blur-sm">
<!-- Glassy Overlays for fade effect -->
<div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-surface-container to-transparent z-10 pointer-events-none rounded-t-[32px]"></div>
<div class="absolute bottom-0 left-0 w-full h-24 bg-gradient-to-t from-surface-container to-transparent z-10 pointer-events-none rounded-b-[32px]"></div>
<!-- Focus Indicator (Selection Area) -->
<div class="absolute top-1/2 left-4 right-4 h-[88px] -translate-y-1/2 bg-white/40 rounded-[24px] border-[3px] border-primary shadow-[0_8px_24px_rgba(67,67,213,0.15)] z-0 mix-blend-overlay"></div>
<!-- Scrolling Items (Implied Animation State) -->
<div class="flex flex-col items-center justify-center w-full relative z-20 space-y-4 -translate-y-2">
<!-- Blurred Top Items -->
<div class="text-h2 font-h2 text-on-surface-variant opacity-20 blur-[2px] scale-75 transform transition-all">Pizza</div>
<div class="text-h2 font-h2 text-on-surface-variant opacity-40 blur-[1px] scale-90 transform transition-all">Burgers</div>
<!-- Selected Center Item -->
<div class="h-[88px] flex items-center justify-center w-full px-8">
<span class="text-[40px] font-h1 font-black text-primary-fixed-variant tracking-tight transform scale-110 drop-shadow-md">Sushi</span>
</div>
<!-- Blurred Bottom Items -->
<div class="text-h2 font-h2 text-on-surface-variant opacity-40 blur-[1px] scale-90 transform transition-all">Tacos</div>
<div class="text-h2 font-h2 text-on-surface-variant opacity-20 blur-[2px] scale-75 transform transition-all">Salad</div>
</div>
</div>
<!-- Result Text -->
<div class="text-center mb-12 animate-fade-in-up">
<p class="text-body-lg font-body-lg text-on-surface-variant mb-2">The universe has spoken.</p>
<h1 class="text-[40px] leading-[1.1] font-h1 text-on-background tracking-tight">You're having <br/><span class="text-primary block mt-2">Sushi!</span></h1>
</div>
<!-- Actions Container -->
<div class="w-full max-w-sm flex flex-col gap-gutter">
<!-- Primary Action (Level 2 Elevation) -->
<button class="w-full h-16 bg-primary text-on-primary rounded-[24px] shadow-[0_8px_20px_rgba(67,67,213,0.25)] flex items-center justify-center gap-2 hover:bg-surface-tint active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined text-xl" data-icon="refresh">refresh</span>
<span class="font-label-caps text-label-caps text-[14px]">Pick Again</span>
</button>
<!-- Secondary Action (Soft/Tactile) -->
<button class="w-full h-16 bg-inverse-on-surface text-on-surface-variant rounded-[24px] flex items-center justify-center hover:bg-surface-variant active:scale-95 transition-all duration-200 border border-transparent hover:border-outline-variant/30">
<span class="font-label-caps text-label-caps text-[14px]">Back to Groups</span>
</button>
</div>
</main>
<!-- Navigation Shell SUPPRESSED: Intent is Task-Focused/Linear Decision -->
